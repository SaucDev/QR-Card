<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monkey Type Clone - Test your typing skills</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <dialog id="standby-dialog"></dialog>
    <header>
      <i class="fa-regular fa-keyboard fa-2xl"></i>
      <h1><b>S</b>auce <b>T</b>yping <b>Test</b></h1>
    </header>
    <main>
      <section id="game">
        <time datetime=""></time>
        <p></p>
      </section>
      <dialog id="results">
        <section>
          <article id="summary">
            <h2>WPM</h2>
            <h3 id="wpm"></h3>
            <h2>Accuracy</h2>
            <h3 id="accuracy"></h3>
          </article>
          <article id="totals">
            <h4>Words typed</h4>
            <h5 id="word-totals"></h5>
            <h4>Letters typed</h4>
            <h5 id="typed-totals"></h5>
            <h4>Miss-types</h4>
            <h5 id="miss-types"></h5>
          </article>
        </section>
        <button>
          <i class="fa-solid fa-repeat fa-xl"></i>
        </button>
      </dialog>
    </main>
  </body>
  <script src="script.js" type="module"></script>
</html>
